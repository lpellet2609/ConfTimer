<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Conftimer — Affichage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    #timer-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 4px solid transparent;
      border-radius: 20px;
      padding: 16px 36px;
      transition: border-color .5s, box-shadow .5s;
    }
    #timer-box.overtime-box {
      border-color: #e03020;
      box-shadow: 0 0 56px rgba(224,48,32,0.4);
    }
    #mode-label {
      font-size: clamp(14px, 2.5vw, 28px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4vh;
      transition: color .4s;
    }
    #time {
      font-size: clamp(80px, 26vw, 340px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      transition: color 0.4s;
      color: #fff;
    }
    #status-label {
      font-size: clamp(12px, 1.8vw, 22px);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-top: 4vh;
    }
    #conn-dot {
      position: fixed;
      top: 18px; right: 22px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.4s;
    }
    #conn-dot.on  { background: #2d8f2d; }
    #conn-dot.off { background: #8f2d2d; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }
    .blink { animation: blink 1s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="timer-box">
    <div id="mode-label">Chronomètre</div>
    <div id="time">00:00</div>
  </div>
  <div id="status-label">PRÊT</div>
  <div id="conn-dot"></div>
  <script>
    const timerBox = document.getElementById('timer-box');
    const timeEl   = document.getElementById('time');
    const modeEl   = document.getElementById('mode-label');
    const statusEl = document.getElementById('status-label');
    const connDot  = document.getElementById('conn-dot');

    (function() {
      let sentinel = null;
      async function lock() {
        if (!('wakeLock' in navigator)) return;
        try {
          sentinel = await navigator.wakeLock.request('screen');
          sentinel.addEventListener('release', () => {
            if (document.visibilityState === 'visible') lock();
          });
        } catch (_) {}
      }
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') lock();
      });
      lock();
    })();

    function pad(n) { return String(n).padStart(2, '0'); }
    function fmt(s) {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
    }

    function applyState(st) {
      const lbls = { idle: 'PRÊT', running: 'EN COURS', paused: 'PAUSE', finished: 'TERMINÉ' };
      statusEl.textContent = lbls[st.status] ?? '';

      timeEl.className = '';
      timerBox.classList.remove('overtime-box');

      if (st.mode === 'stopwatch') {
        modeEl.textContent   = 'Chronomètre';
        modeEl.style.color   = '#555';
        timeEl.style.color   = '#fff';
        timeEl.textContent   = fmt(st.elapsed);
      } else if (st.status === 'finished') {
        const overtime       = st.elapsed - st.duration;
        modeEl.textContent   = 'DÉPASSEMENT';
        modeEl.style.color   = '#e03020';
        timeEl.style.color   = '#e03020';
        timeEl.textContent   = '-' + fmt(overtime);
        timerBox.classList.add('overtime-box');
      } else {
        const secs           = Math.max(0, st.duration - st.elapsed);
        modeEl.textContent   = 'Compte à rebours';
        modeEl.style.color   = '#555';
        timeEl.style.color   = '#fff';
        timeEl.textContent   = fmt(secs);
        if (secs <= 60) timeEl.classList.add('blink');
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen    = () => connDot.className = 'on';
      ws.onmessage = (e) => { const d = JSON.parse(e.data); if (d.type === 'state') applyState(d); };
      ws.onclose   = () => { connDot.className = 'off'; setTimeout(connect, 2000); };
      ws.onerror   = () => ws.close();
    }
    connect();
  </script>
</body>
</html>
