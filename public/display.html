<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Conftimer — Affichage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    #mode-label {
      font-size: clamp(14px, 2.5vw, 28px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4vh;
    }
    #time {
      font-size: clamp(80px, 26vw, 340px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      transition: color 0.4s ease, border-color 0.4s ease;
      color: #fff;
    }
    #status-label {
      font-size: clamp(12px, 1.8vw, 22px);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-top: 4vh;
    }
    #conn-dot {
      position: fixed;
      top: 18px; right: 22px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.4s;
    }
    #conn-dot.on  { background: #2d8f2d; }
    #conn-dot.off { background: #8f2d2d; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }
    .blink { animation: blink 1s ease-in-out infinite; }
    .overtime {
      color: #e03020 !important;
      border: 4px solid #e03020;
      border-radius: 16px;
      padding: 0.08em 0.22em;
      box-shadow: 0 0 48px rgba(224, 48, 32, 0.35);
    }
  </style>
</head>
<body>
  <div id="mode-label">Chronomètre</div>
  <div id="time">00:00</div>
  <div id="status-label">PRÊT</div>
  <div id="conn-dot"></div>
  <script>
    const timeEl   = document.getElementById('time');
    const modeEl   = document.getElementById('mode-label');
    const statusEl = document.getElementById('status-label');
    const connDot  = document.getElementById('conn-dot');

    if ('wakeLock' in navigator) {
      const keepAwake = () => navigator.wakeLock.request('screen').catch(() => {});
      keepAwake();
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') keepAwake();
      });
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function fmt(s) {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
    }

    function applyState(st) {
      modeEl.textContent = st.mode === 'stopwatch' ? 'Chronomètre' : 'Compte à rebours';
      const lbls = { idle: 'PRÊT', running: 'EN COURS', paused: 'PAUSE', finished: 'TERMINÉ' };
      statusEl.textContent = lbls[st.status] ?? '';

      timeEl.className = '';
      timeEl.style.color = '#fff';

      if (st.mode === 'stopwatch') {
        timeEl.textContent = fmt(st.elapsed);
      } else if (st.status === 'finished') {
        const overtime = st.elapsed - st.duration;
        timeEl.textContent = '-' + fmt(overtime);
        timeEl.classList.add('overtime');
      } else {
        const secs = Math.max(0, st.duration - st.elapsed);
        timeEl.textContent = fmt(secs);
        if (secs <= 60) timeEl.classList.add('blink');
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen    = () => connDot.className = 'on';
      ws.onmessage = (e) => { const d = JSON.parse(e.data); if (d.type === 'state') applyState(d); };
      ws.onclose   = () => { connDot.className = 'off'; setTimeout(connect, 2000); };
      ws.onerror   = () => ws.close();
    }
    connect();
  </script>
</body>
</html>
